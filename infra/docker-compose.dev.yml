services:
  # Development override for the frontend service.
  # Usage:
  # docker-compose -f infra/docker-compose.yml -f infra/docker-compose.dev.yml up --build frontend
  frontend:
    container_name: meshlogiq-frontend-dev
    working_dir: /app
    build:
      context: ../platform/frontend
      dockerfile: Dockerfile
      target: builder
    env_file:
      - ./env_files/frontend.env
    volumes:
      - ../platform/frontend:/app:cached
      - meshlogiq_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    environment:
      # Helpful for Windows file change detection when using bind mounts
      - CHOKIDAR_USEPOLLING=true
    command: sh -c "npm ci --prefer-offline --no-audit --progress=false && npm run dev -- --host 0.0.0.0 --port 5173"
    networks:
      - meshlogiq-net
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=meshlogiq-plat_meshlogiq-net"
      - "traefik.http.routers.frontend.rule=Host(`meshlogiq.local`)"
      - "traefik.http.routers.frontend.entrypoints=websecure"
      - "traefik.http.routers.frontend.tls=true"
      - "traefik.http.routers.frontend.priority=100"
      - "traefik.http.services.frontend.loadbalancer.server.port=5173"
      # Keycloak framing middleware belongs on the Keycloak service, not frontend

volumes:
  meshlogiq_node_modules:

networks:
  meshlogiq-net:
    driver: bridge
