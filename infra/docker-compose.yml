services:
  traefik:
    image: traefik:latest
    container_name: meshlogiq-traefik
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./traefik/config/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/config/dynamic.yml:/etc/traefik/dynamic.yml:ro
      - ./traefik/certs:/certs:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - meshlogiq-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.traefik-dashboard.loadbalancer.server.port=8080"
      - "traefik.http.routers.traefik-dashboard.rule=Host(`traefik.meshlogiq.local`)"
      - "traefik.http.routers.traefik-dashboard.entrypoints=websecure"
      - "traefik.http.routers.traefik-dashboard.tls=true"
      - "traefik.http.routers.traefik-dashboard.service=api@internal"
  db:
    image: postgres:18
    container_name: meshlogiq-db
    restart: unless-stopped
    env_file:
      - ./env_files/db.env
    volumes:
      - meshlogiq_pgdata:/home/postgres/pgdata/data
      - ./db/initdb:/docker-entrypoint-initdb.d
    networks:
      - meshlogiq-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: meshlogiq-pgadmin
    env_file:
      - ./env_files/pgadmin.env
    environment:
      PGADMIN_CONFIG_CHECK_EMAIL_DELIVERABILITY: 'False'
      PGADMIN_CONFIG_ALLOW_SPECIAL_EMAIL_DOMAINS: "['local','meshlogiq.local']"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - meshlogiq_pga_data:/var/lib/pgadmin
    networks:
      - meshlogiq-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.pgadmin.loadbalancer.server.port=80"
      - "traefik.http.routers.pgadmin.rule=Host(`pgadmin.meshlogiq.local`)"
      - "traefik.http.routers.pgadmin.entrypoints=websecure"
      - "traefik.http.routers.pgadmin.tls=true"

volumes:
  meshlogiq_pgdata:
  meshlogiq_pga_data:

networks:
  meshlogiq-net:
    driver: bridge

