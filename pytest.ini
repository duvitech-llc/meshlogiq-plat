[pytest]
# Django settings for the auth-gateway service
DJANGO_SETTINGS_MODULE = core.settings

# Add the auth-gateway source root to sys.path so 'core', 'apps', 'middleware' are importable
pythonpath = platform/services/auth-gateway

# Test discovery
testpaths = tests

# Output
addopts = -v --tb=short --strict-markers

# Custom markers
markers =
    unit: Pure unit tests (no DB, no network)
    integration: Tests that require the test database
    login: Authentication login/logout flow tests
    token: JWT token validation tests
